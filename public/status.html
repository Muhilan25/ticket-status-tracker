<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Case Status Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --primary:#002E5D;
    --secondary:#0D5EA6;
    --bg:#F5F8FC;
}

body{
    background:var(--bg);
    font-family:'Poppins',sans-serif;
}

.hero-section{
    background:#ffffff;
    color:white;
    padding:25px 0;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
}

.main-card{
    margin-top:30px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.table th{
    width:35%;
    background:#f8f9fa;
}

.status-badge{
    background:#198754;
    color:white;
    padding:6px 15px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
}

.logo{
    max-height:70px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="hero-section">
    <img src="assests/Onity-logo-TM.jpg" class="logo" alt="Logo">
    <h2 style="color: black;">Case Status Tracker</h2>
</div>

<div class="container">

    <div id="result"></div>

</div>

<script>

const ticketId =
new URLSearchParams(window.location.search)
.get("ticket");

if(ticketId){

    fetch(`/ticket/${ticketId}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("result").innerHTML = `

        <div class="card main-card">

            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    Request Details
                </h4>
            </div>

            <div class="card-body">

                <table class="table table-bordered table-striped align-middle">

                    <tr>
                        <th>Ticket Number</th>
                        <td>${data.ticketNo}</td>
                    </tr>

                    <tr>
                        <th>Status</th>
                        <td>
                            <span class="status-badge">
                                ${data.status}
                            </span>
                        </td>
                    </tr>

                    <tr>
                        <th>Priority</th>
                        <td>${data.priority}</td>
                    </tr>

                    <tr>
                        <th>Requester Name</th>
                        <td>${data.requesterName}</td>
                    </tr>

                    <tr>
                        <th>Requester Email</th>
                        <td>${data.requesterEmail}</td>
                    </tr>

                    <tr>
                        <th>Created Date</th>
                        <td>${data.createdDate}</td>
                    </tr>

                    <tr>
                        <th>Subject</th>
                        <td>${data.subject}</td>
                    </tr>

                </table>

            </div>

        </div>

        `;
    })
    .catch(err => {

        document.getElementById("result").innerHTML = `
            <div class="alert alert-danger mt-4">
                Ticket not found.
            </div>
        `;
    });

}

</script>

</body>
</html>
