<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Case Status Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --primary:#002E5D;
    --secondary:#0D5EA6;
    --bg:#F5F8FC;
}

body{
    background:var(--bg);
    font-family:'Poppins',sans-serif;
}

.hero-section{
    background:#ffffff;
    color:white;
    padding:25px 0;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
}

.main-card{
    margin-top:30px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.table th{
    width:35%;
    background:#f8f9fa;
}

.status-badge{
    background:#198754;
    color:white;
    padding:6px 15px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
}

.logo{
    max-height:70px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="hero-section">
    <img src="assests/Onity-logo-TM.jpg" class="logo" alt="Logo">
    <h2 style="color: black;">Case Status Tracker</h2>
</div>

<div class="container">

    <div id="result"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

    const resultDiv = document.getElementById("result");

    const params = new URLSearchParams(window.location.search);
    let ticketParam = params.get("ticket");

    if (!ticketParam) {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                Missing ticket in URL
            </div>`;
        return;
    }

    let ticketNo;

    // STEP 1: detect if already base64 or raw
    const isBase64 = /^[A-Za-z0-9+/=]+$/.test(ticketParam);

    try {
        if (isBase64 && isNaN(ticketParam)) {
            // already encoded → decode
            ticketNo = atob(ticketParam);
        } else {
            // raw → encode first, then decode flow
            const encoded = btoa(ticketParam);

            // update URL to encoded form (no reload)
            window.history.replaceState({}, "", `status.html?ticket=${encoded}`);

            ticketNo = ticketParam;
        }
    } catch (e) {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                Invalid ticket format
            </div>`;
        return;
    }

    // loading UI
    resultDiv.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-border text-primary"></div>
            <p>Loading ticket...</p>
        </div>`;

    try {
        const res = await fetch(`/ticket/${encodeURIComponent(ticketNo)}`);

        if (!res.ok) throw new Error("Not found");

        const data = await res.json();

        resultDiv.innerHTML = `
            <div class="card main-card">

                <div class="card-header bg-primary text-white text-center">
                    Request Details
                </div>

                <div class="card-body">

                    <table class="table table-bordered">

                        <tr>
                            <th>Ticket Number</th>
                            <td>${data.ticketNo}</td>
                        </tr>

                        <tr>
                            <th>Status</th>
                            <td>${data.status}</td>
                        </tr>

                        <tr>
                            <th>Priority</th>
                            <td>${data.priority}</td>
                        </tr>

                        <tr>
                            <th>Name</th>
                            <td>${data.requesterName}</td>
                        </tr>

                        <tr>
                            <th>Email</th>
                            <td>${data.requesterEmail}</td>
                        </tr>

                        <tr>
                            <th>Created</th>
                            <td>${data.createdDate}</td>
                        </tr>

                    </table>

                </div>

            </div>
        `;

    } catch (err) {
        resultDiv.innerHTML = `
            <div class="alert alert-danger">
                Ticket not found or server error
            </div>`;
    }

});
</script>


</body>
</html>
